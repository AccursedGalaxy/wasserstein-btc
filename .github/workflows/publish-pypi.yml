name: publish-pypi

# Fires only on tag push (v*). Manual trigger also available.
# Won't run on regular commits — safe to land without affecting normal pushes.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.4.1)"
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sanity — version in pyproject matches tag
        run: |
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          # workflow_dispatch path
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TAG="${TAG#v}"
          fi
          echo "pyproject version: $PYPROJECT_VERSION"
          echo "tag (stripped):    $TAG"
          if [ "$PYPROJECT_VERSION" != "$TAG" ]; then
            echo "::error::pyproject.toml version ($PYPROJECT_VERSION) does not match tag ($TAG)"
            exit 1
          fi

      - name: Install dependencies + run tests
        run: |
          uv sync --frozen
          uv run pytest -q

      - name: Build wheel + sdist
        run: uv build

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/wbtc/
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --upgrade twine
          twine upload --non-interactive --username __token__ --password "$UV_PUBLISH_TOKEN" dist/*
