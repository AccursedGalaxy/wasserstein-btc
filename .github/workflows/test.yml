name: test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q

      - name: Smoke-test CLI
        run: |
          uv run wbtc --version
          uv run wbtc --help

      - name: Smoke-test public API import
        run: |
          uv run python -c "import wbtc; print('wbtc', wbtc.__version__, list(wbtc.__all__)[:6])"
